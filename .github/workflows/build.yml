name: Binary Build Nightly x64 Executables (3:00, UTC+8)

name: Build and Auto-Release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install Dependencies
        run: |
          uv pip sync requirements.txt --system
          uv run playwright install --with-deps chromium
          uv pip install pyinstaller --system

      
      - name: Build With Pyinstaller
        run: |
          pyinstaller --onefile --console --icon="icon.ico" --version-file="version.txt" --name CNKIBug CNKIBug.py

  
      - name: Upload artifact to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/CNKIBug.exe
