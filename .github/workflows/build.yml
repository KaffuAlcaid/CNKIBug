name: Build and Auto-Release

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Install dependencies
        shell: bash
        run: |
          uv pip install -r requirements.txt -r requirements-dev.txt pyinstaller --system


      - name: Smoke test (compile + import on Windows)
        shell: bash
        run: |
          python -m py_compile run.py cnkibug/*.py
          python -c "import cnkibug.errors, cnkibug.ui, cnkibug.environment, cnkibug.exporter, cnkibug.scraper; print('import graph OK')"

      - name: Unit tests
        shell: bash
        run: |
          pytest

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --console --icon="icon.ico" --version-file="version.txt" --name CNKIBug run.py

      - name: Determine target release tag
        id: get_tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "TAG_NAME=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            LATEST_TAG=$(gh release view --json tagName --jq '.tagName')
            echo "TAG_NAME=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          files: dist/CNKIBug.exe

