name: Build and Auto-Release

permissions:
  contents: write

on:
  release:
    types: [published] # 发布新的 Release 时触发
  workflow_dispatch:   # 手动点击触发
  # 移除了 push: main，避免每次推代码都构建，节省 Action 额度

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        shell: bash
        run: |
          # 采用了你最新的 requirements.txt 逻辑
          uv pip install -r requirements.txt pyinstaller --system
          uv run playwright install --with-deps chromium

      - name: Build With Pyinstaller
        shell: bash
        run: |
          pyinstaller --onefile --console --icon="icon.ico" --version-file="version.txt" --name CNKIBug CNKIBug.py

      - name: Determine Target Release Tag
        id: get_tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 判断触发方式
          if [ "${{ github.event_name }}" == "release" ]; then
            # 自动触发：直接拿当前 Release 的 Tag
            echo "TAG_NAME=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            # 手动触发：通过 GitHub CLI 找到最新的 Release Tag
            LATEST_TAG=$(gh release view --json tagName --jq '.tagName')
            echo "TAG_NAME=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用上面动态获取到的 Tag，这样手动构建也能准确推送到 latest 页面
          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          files: dist/CNKIBug.exe
