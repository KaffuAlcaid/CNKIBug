name: Build and Auto-Release

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: cnkibug-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    outputs:
      tag_name: ${{ steps.get_tag.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Determine target release tag
        id: get_tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TARGET_TAG="$RELEASE_TAG"
          else
            TARGET_TAG="$(gh release view --json tagName --jq '.tagName')"
          fi
          if [ -z "$TARGET_TAG" ]; then
            echo "Unable to determine target release tag" >&2
            exit 1
          fi
          printf 'tag_name=%s\n' "$TARGET_TAG" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            requirements-dev.txt
            requirements-build.txt

      - name: Install dependencies
        shell: bash
        run: |
          uv pip install --system -e . -r requirements-dev.txt -r requirements-build.txt

      - name: Install Playwright browsers
        shell: bash
        run: |
          python -m playwright install --with-deps chromium

      - name: Smoke test source imports on Windows
        shell: bash
        run: |
          python -m py_compile run.py cnkibug/*.py
          python -c "import cnkibug.errors, cnkibug.ui, cnkibug.environment, cnkibug.exporter, cnkibug.scraper; print('import graph OK')"

      - name: Unit tests
        shell: bash
        run: |
          python -m pytest tests

      - name: Build with PyInstaller
        shell: bash
        run: |
          python generate_version_info.py version.txt
          pyinstaller --onefile --console --icon="icon.ico" \
            --version-file="version.txt" \
            --copy-metadata cnkibug \
            --name CNKIBug \
            run.py

      - name: Smoke test packaged executable
        shell: pwsh
        run: |
          $output = & .\dist\CNKIBug.exe --self-check
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged executable self-check failed"
          }
          $expected = python -c "from cnkibug.version import APP_VERSION; print(APP_VERSION)"
          if (($output -join "`n").Trim() -ne "CNKIBug self-check OK: $expected") {
            throw "Packaged executable version does not match project version"
          }

      - name: Store release executable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-executable
          path: dist/CNKIBug.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release executable
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-executable
          path: dist

      - name: Upload executable to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          files: dist/CNKIBug.exe
