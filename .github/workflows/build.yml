name: Build and Auto-Release

permissions:
  contents: write

on:
  release:
    types: [published] 
  workflow_dispatch:  


jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\uv\cache
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        shell: bash
        run: |
          # 采用了你最新的 requirements.txt 逻辑
          uv pip install -r requirements.txt pyinstaller --system
          uv run playwright install --with-deps chromium

      - name: Build With Pyinstaller
        shell: bash
        run: |
          pyinstaller --onefile --console --icon="icon.ico" --version-file="version.txt" --name CNKIBug CNKIBug.py

      - name: Determine Target Release Tag
        id: get_tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          if [ "${{ github.event_name }}" == "release" ]; then

            echo "TAG_NAME=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else

            LATEST_TAG=$(gh release view --json tagName --jq '.tagName')
            echo "TAG_NAME=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact to Release
        uses: softprops/action-gh-release@v2
        with:

          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          files: dist/CNKIBug.exe
